<!DOCTYPE html>
<html>
<head>
    <title>Work Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input, select, button { display: block; width: 100%; margin-bottom: 15px; padding: 10px; }
        button { background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Daily Attendance</h2>
    <form>
        <label>Employee Name:</label>
        <input type="text" placeholder="Enter name">

        <label>Date:</label>
        <input type="date">

        <label>Status:</label>
        <select>
            <option>Present</option>
            <option>Absent</option>
            <option>Late</option>
        </select>

        <button type="button" onclick="alert('Attendance Recorded!')">Submit</button>
    </form>
</body>
</html>
